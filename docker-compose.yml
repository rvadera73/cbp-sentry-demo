version: '3.8'

# ARCHITECTURE:
# - UI (React Vite) → Nginx on port 3000
# - API Gateway (FastAPI) → port 8000
# - Data Service (FastAPI) → port 8005
# - All services communicate via sentry-network bridge
#
# NO volume mounts for built code (conflicts with Docker image)
# Only data volumes persist across restarts

services:
  # === DATA LAYER ===
  sentry-data:
    build:
      context: ./services/data
      dockerfile: Dockerfile
      cache_from:
        - sentry-data:latest
    image: sentry-data:latest
    container_name: sentry-data
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:///./data/cbp_sentry.db}
      PYTHONUNBUFFERED: "1"
      ENVIRONMENT: ${DEPLOYMENT_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${DATA_PORT:-8005}:8005"
    volumes:
      # ONLY persist database, NOT source code
      - sentry_data_volume:/app/data
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - sentry-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === API LAYER ===
  sentry-api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
      cache_from:
        - sentry-api:latest
    image: sentry-api:latest
    container_name: sentry-api
    environment:
      DATA_SERVICE_URL: ${DATA_SERVICE_URL:-http://sentry-data:8005}
      SENZING_URL: ${SENZING_URL:-http://senzing:8250}
      API_MODE: ${API_MODE:-fixture}
      PYTHONUNBUFFERED: "1"
      ENVIRONMENT: ${DEPLOYMENT_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VESSELAPI_KEY: ${VESSELAPI_KEY:-}
      OFAC_API_KEY: ${OFAC_API_KEY:-}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      sentry-data:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - sentry-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === UI LAYER ===
  sentry-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      cache_from:
        - sentry-ui:latest
    image: sentry-ui:latest
    container_name: sentry-ui
    environment:
      VITE_API_URL: ${API_URL:-http://localhost:8000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${UI_PORT:-3001}:80"
    depends_on:
      sentry-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - sentry-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === OPTIONAL: Senzing Entity Resolution ===
  senzing:
    image: senzing/senzing-api-server:3.5.2
    container_name: sentry-senzing
    environment:
      SENZING_ENGINE_CONFIGURATION_JSON: |
        {
          "PIPELINE": {
            "SUPPORTPATH": "/var/opt/senzing"
          },
          "SQL": {
            "CONNECTION": "sqlite:////var/opt/senzing/senzing.db"
          }
        }
    ports:
      - "8250:8250"
    volumes:
      - senzing_data_volume:/var/opt/senzing
      - ./senzing/senzing.license:/etc/opt/senzing/senzing.license:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8250/heartbeat"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped
    networks:
      - sentry-network
    profiles:
      - senzing

# === VOLUMES ===
# Only data persists, NOT source code
volumes:
  sentry_data_volume:
    driver: local
  senzing_data_volume:
    driver: local

# === NETWORKS ===
networks:
  sentry-network:
    driver: bridge
