version: '3.8'

# ARCHITECTURE:
# - UI (React Vite) → Nginx on port 3000
# - API Gateway (FastAPI) → port 8000
# - Data Service (FastAPI) → port 8005
# - All services communicate via sentry-network bridge
#
# NO volume mounts for built code (conflicts with Docker image)
# Only data volumes persist across restarts

services:
  # === DATA LAYER ===
  sentry-db:
    image: pgvector/pgvector:pg15
    container_name: sentry-db
    environment:
      POSTGRES_USER: sentry
      POSTGRES_PASSWORD: sentry-secret
      POSTGRES_DB: sentry
    volumes:
      - sentry_db_data:/var/lib/postgresql/data
      - ./services/data/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentry -d sentry"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentry-network
    restart: unless-stopped

  sentry-data:
    build:
      context: .
      dockerfile: services/data/Dockerfile
      cache_from:
        - sentry-data:latest
    image: sentry-data:latest
    container_name: sentry-data
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://sentry:sentry-secret@sentry-db:5432/sentry}
      PYTHONUNBUFFERED: "1"
      ENVIRONMENT: ${DEPLOYMENT_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${DATA_PORT:-8005}:8005"
    depends_on:
      sentry-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - sentry-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === PHASE 2: Precise Risk Engine Microservice (DEPRECATED) ===
  # NOTE: precise-risk-engine is superseded by cbp-risk-engine (port 8010).
  # Left here under 'legacy' profile so it does NOT start by default.
  precise-risk-engine:
    profiles:
      - legacy
    build:
      context: .
      dockerfile: services/risk-engine/Dockerfile
      cache_from:
        - precise-risk-engine:latest
    image: precise-risk-engine:latest
    container_name: precise-risk-engine
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_APP: app.py
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${PRECISE_RISK_ENGINE_PORT:-8007}:8004"
    depends_on:
      sentry-data:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8004/health')"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    networks:
      - sentry-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === MLOps MCP Service (cbp-risk-engine) ===
  cbp-risk-engine:
    build:
      context: /home/rahulvadera/cbp-risk-engine
      dockerfile: Dockerfile
      cache_from:
        - cbp-risk-engine:latest
    image: cbp-risk-engine:latest
    container_name: cbp-risk-engine
    environment:
      MODEL_DIR: /models
      SENTRY_SRC: /sentry_src
      DATA_DIR: /app/data
      MLFLOW_TRACKING_URI: sqlite:////app/data/mlflow.db
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${MCP_PORT:-8010}:8010"
    volumes:
      - ./models:/models:ro
      - ./services/api:/sentry_src:ro
      - cbp_risk_engine_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    networks:
      - sentry-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === API LAYER ===
  sentry-api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      cache_from:
        - sentry-api:latest
    image: sentry-api:latest
    container_name: sentry-api
    environment:
      DATA_SERVICE_URL: ${DATA_SERVICE_URL:-http://sentry-data:8005}
      SENZING_URL: ${SENZING_URL:-http://senzing:8250}
      CORD_SERVICE_URL: ${CORD_SERVICE_URL:-http://sentry-cord-integration:8004}
      MCP_ENGINE_URL: ${MCP_ENGINE_URL:-http://cbp-risk-engine:8010}
      CORD_DATA_DIR: /app/cord-data
      CORD_INDEX_PATH: /app/data/cord_index.db
      API_MODE: ${API_MODE:-live}
      PYTHONUNBUFFERED: "1"
      ENVIRONMENT: ${DEPLOYMENT_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      VESSELAPI_KEY: ${VESSELAPI_KEY:-}
      OFAC_API_KEY: ${OFAC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-cbp-sentry}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./cord-data:/app/cord-data:ro
    depends_on:
      sentry-data:
        condition: service_healthy
      sentry-cord-integration:
        condition: service_healthy
      cbp-risk-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - sentry-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === UI LAYER ===
  sentry-ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
      cache_from:
        - sentry-ui:latest
      args:
        # Build-time API_URL configuration:
        # Local:   docker-compose up (uses /api nginx proxy)
        # Staging: API_URL=https://api.staging.example.com docker-compose up
        # Prod:    API_URL=https://sentry-api-prod.example.com docker-compose up
        API_URL: ${API_URL}
    image: sentry-ui:latest
    container_name: sentry-ui
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${UI_PORT:-3001}:80"
    depends_on:
      sentry-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - sentry-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === CORD Integration Service ===
  sentry-cord-integration:
    build:
      context: .
      dockerfile: services/cord-integration/Dockerfile
      cache_from:
        - sentry-cord-integration:latest
    image: sentry-cord-integration:latest
    container_name: sentry-cord-integration
    environment:
      CORD_DATA_DIR: /app/cord-data
      DATA_SERVICE_URL: ${DATA_SERVICE_URL:-http://sentry-data:8005}
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${CORD_PORT:-8004}:8004"
    volumes:
      - ./cord-data:/app/cord-data:ro
    depends_on:
      sentry-data:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped
    networks:
      - sentry-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === OPTIONAL: Senzing Entity Resolution ===
  senzing:
    image: senzing/senzing-api-server:3.5.2
    container_name: sentry-senzing
    environment:
      SENZING_ENGINE_CONFIGURATION_JSON: |
        {
          "PIPELINE": {
            "SUPPORTPATH": "/var/opt/senzing"
          },
          "SQL": {
            "CONNECTION": "sqlite:////var/opt/senzing/senzing.db"
          }
        }
    ports:
      - "8250:8250"
    volumes:
      - senzing_data_volume:/var/opt/senzing
      - ./senzing/senzing.license:/etc/opt/senzing/senzing.license:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8250/heartbeat"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped
    networks:
      - sentry-network
    profiles:
      - senzing

# === VOLUMES ===
# sentry_data_volume: shared by both data + API (for DB + CORD index persistence)
volumes:
  sentry_db_data:
    driver: local
  sentry_data_volume:
    driver: local
  senzing_data_volume:
    driver: local
  cbp_risk_engine_data:
    driver: local

# === NETWORKS ===
networks:
  sentry-network:
    driver: bridge
