[pytest]
# Sentry CBP API Test Configuration

# Test discovery
testpaths = api/tests
python_files = test_*.py conftest.py
python_classes = Test*
python_functions = test_*

# Asyncio mode (FastAPI uses async)
asyncio_mode = auto

# Coverage
addopts =
    -v
    --cov=api
    --cov-report=term-missing
    --cov-report=html:htmlcov/
    --cov-branch
    --tb=short

# Markers
markers =
    integration: integration tests (require services)
    unit: unit tests (fast, no external services)
    slow: slow tests (> 1 second)
    smoke: smoke tests (health checks)

# Logging
log_cli = false
log_cli_level = INFO
log_file = logs/pytest.log
log_file_level = DEBUG

# Timeout (seconds)
timeout = 10

# Disable warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
