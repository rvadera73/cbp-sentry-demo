[pytest]
# Sentry CBP Test Configuration
# Risk model management, integration testing, API validation

# Test discovery
testpaths = tests services/api/tests api/tests
python_files = test_*.py conftest.py
python_classes = Test*
python_functions = test_*

# Asyncio configuration (FastAPI uses async)
asyncio_mode = auto
asyncio_default_fixture_scope = function

# Coverage configuration
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=services
    --cov=api
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov/
    --cov-report=xml:coverage.xml
    --cov-branch
    --cov-fail-under=70

# Test markers (custom test categorization)
markers =
    asyncio: async test (uses event loop)
    unit: unit test (fast, no external services)
    integration: integration test (requires services)
    smoke: smoke test (health checks, basic validation)
    slow: slow test (> 1 second execution)
    database: test uses database
    api: test uses FastAPI endpoints
    risk_engine: test requires risk engine service
    senzing: test requires Senzing service

# Logging
log_cli = false
log_cli_level = INFO
log_file = test-results/pytest.log
log_file_level = DEBUG
log_format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# Timeout (seconds)
timeout = 30
timeout_method = thread

# Disable warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Doctest configuration
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS

# Test paths and output
junit_family = xunit2
junit_logging = short
