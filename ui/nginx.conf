events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  gzip on;
  gzip_types text/css application/javascript text/javascript;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Add version header for debugging
    add_header X-App-Version "sentry-cbp-v1" always;

    # HTML - NO CACHE (always get latest)
    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
    }

    # React Router fallback
    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
    }

    # API calls are made directly from React app to Cloud Run API URL
    # No nginx proxy needed for Cloud Run deployment

    # Hashed assets (Vite generates these with hash in filename)
    location ~* "\-[0-9a-f]{8}\.(js|css)$" {
      expires 1y;
      add_header Cache-Control "public, immutable" always;
    }

    # All other static assets - SHORT CACHE
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 1d;
      add_header Cache-Control "public, max-age=86400" always;
    }
  }
}
