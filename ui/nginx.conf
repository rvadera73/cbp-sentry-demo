events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  gzip on;
  gzip_types text/css application/javascript text/javascript;

  # Resolver for dynamic DNS (required for sentry-api hostname resolution)
  # Use Docker's embedded DNS server (127.0.0.11:53) for Docker environments
  # In Cloud Run, this location won't be used because React app uses VITE_API_URL
  resolver 127.0.0.11 8.8.8.8 valid=10s;
  resolver_timeout 5s;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Add version header for debugging
    add_header X-App-Version "sentry-cbp-v1" always;

    # HTML - NO CACHE (always get latest)
    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
    }

    # React Router fallback
    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
    }

    # API Proxy - for LOCAL DOCKER development only
    # In Cloud Run, VITE_API_URL is set at build time to the sentry-api Cloud Run URL
    # React code makes direct requests to the API and doesn't use this proxy
    location /api/ {
      # Use variable to defer DNS resolution until request time (not startup time)
      set $api_url "http://sentry-api:8000";
      proxy_pass $api_url;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto http;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_request_buffering off;
    }

    # Hashed assets (Vite generates these with hash in filename)
    location ~* "\-[0-9a-f]{8}\.(js|css)$" {
      expires 1y;
      add_header Cache-Control "public, immutable" always;
    }

    # All other static assets - SHORT CACHE
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 1d;
      add_header Cache-Control "public, max-age=86400" always;
    }
  }
}
