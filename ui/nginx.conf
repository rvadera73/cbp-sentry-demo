events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  gzip on;
  gzip_types text/css application/javascript text/javascript;

  # Use resolver to handle dynamic DNS (Cloud Run environment)
  resolver 8.8.8.8 8.8.4.4 valid=10s;
  resolver_timeout 5s;

  server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Add version header for debugging
    add_header X-App-Version "sentry-cbp-v1" always;

    # HTML - NO CACHE (always get latest)
    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
      add_header Pragma "no-cache" always;
      add_header Expires "0" always;
    }

    # React Router fallback
    location / {
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0" always;
    }

    # API Proxy - for LOCAL DOCKER development only
    # In Cloud Run/Staging, VITE_API_URL is set at build time to the actual API URL
    # React code makes direct requests to that URL and doesn't use this proxy
    location /api/ {
      set $backend "http://sentry-api:8000";
      proxy_pass $backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto http;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_connect_timeout 2s;
      proxy_send_timeout 2s;
      proxy_read_timeout 2s;
      error_page 502 503 504 /index.html;
    }

    # Hashed assets (Vite generates these with hash in filename)
    location ~* "\-[0-9a-f]{8}\.(js|css)$" {
      expires 1y;
      add_header Cache-Control "public, immutable" always;
    }

    # All other static assets - SHORT CACHE
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 1d;
      add_header Cache-Control "public, max-age=86400" always;
    }
  }
}
