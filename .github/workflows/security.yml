name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Dependency scanning (Python)
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        working-directory: ./api
        run: pip install -r requirements.txt

      - name: Run pip-audit (Python dependencies)
        working-directory: ./api
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit || echo "⚠️ Some vulnerabilities found. Review and update as needed."

      # Dependency scanning (Node)
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './ui/package-lock.json'

      - name: Install npm dependencies
        working-directory: ./ui
        run: npm ci

      - name: Run npm audit (Node dependencies)
        working-directory: ./ui
        continue-on-error: true
        run: npm audit --audit-level=moderate || echo "⚠️ Some vulnerabilities found. Review and update as needed."

      # SAST scanning (CodeQL)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python, javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      # Secret scanning
      - name: TruffleHog secret scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      # Report summary
      - name: Security scan summary
        if: always()
        run: |
          echo "## Security Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dependencies audited (pip-audit, npm audit)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Static analysis (CodeQL)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Secret scanning (TruffleHog)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Recommended actions:**" >> $GITHUB_STEP_SUMMARY
          echo "- Review any vulnerabilities in GitHub Security tab" >> $GITHUB_STEP_SUMMARY
          echo "- Update dependencies when patches available" >> $GITHUB_STEP_SUMMARY
          echo "- Rotate any exposed secrets immediately" >> $GITHUB_STEP_SUMMARY
