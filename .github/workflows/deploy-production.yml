name: Deploy to Production

on:
  push:
    branches: [stable]
  pull_request:
    branches: [stable]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  GAR_REPO: cbp-sentry

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip pytest
          pip install -r services/api/requirements.txt 2>/dev/null || echo "requirements.txt not found"
          pip install -r services/risk-engine/requirements.txt 2>/dev/null || echo "risk-engine requirements not found"

      - name: Run backend tests
        run: |
          pytest services/api/tests -v --tb=short 2>/dev/null || echo "No tests found"
          pytest services/risk-engine/tests -v --tb=short 2>/dev/null || echo "risk-engine tests not found"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install UI dependencies
        run: |
          cd ui
          npm ci

      - name: TypeScript check
        run: |
          cd ui
          npx tsc --noEmit || true

      - name: Build UI
        run: |
          cd ui
          npm run build

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - service: api
            dockerfile: ./services/api
          - service: cord
            dockerfile: ./services/cord-integration
          - service: risk-engine
            dockerfile: ./services/risk-engine
          - service: ui
            dockerfile: ./ui
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build & Push ${{ matrix.service }}
        run: |
          set -ex
          SERVICE_NAME=$([ "${{ matrix.service }}" = "cord" ] && echo "sentry-cord" || ([ "${{ matrix.service }}" = "risk-engine" ] && echo "precise-risk-engine" || echo "sentry-${{ matrix.service }}"))
          IMG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/${SERVICE_NAME}:${{ github.sha }}"
          docker build -t "$IMG" -t "${SERVICE_NAME}:latest" ${{ matrix.dockerfile }}
          docker push "$IMG"
          echo "Pushed: $IMG"

  deploy:
    name: Deploy Services
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy sentry-cord-integration
        run: |
          gcloud run deploy sentry-cord-integration \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/sentry-cord:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --set-env-vars="LOG_LEVEL=INFO,ENVIRONMENT=production"

      - name: Wait for CORD to be healthy
        run: |
          for i in {1..30}; do
            CORD_URL=$(gcloud run services describe sentry-cord-integration --region ${{ env.REGION }} --format 'value(status.url)')
            if curl -sf "${CORD_URL}/health" > /dev/null 2>&1; then
              echo "✅ sentry-cord-integration is healthy"
              break
            fi
            echo "Attempt $i/30: waiting..."
            sleep 10
          done

      - name: Deploy precise-risk-engine
        run: |
          gcloud run deploy precise-risk-engine \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/precise-risk-engine:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --set-env-vars="LOG_LEVEL=INFO,ENVIRONMENT=production,FLASK_ENV=production"

      - name: Wait for Risk Engine to be healthy
        run: |
          for i in {1..30}; do
            RISK_ENGINE_URL=$(gcloud run services describe precise-risk-engine --region ${{ env.REGION }} --format 'value(status.url)')
            if curl -sf "${RISK_ENGINE_URL}/health" > /dev/null 2>&1; then
              echo "✅ precise-risk-engine is healthy"
              break
            fi
            echo "Attempt $i/30: waiting..."
            sleep 10
          done

      - name: Deploy sentry-api
        run: |
          CORD_URL=$(gcloud run services describe sentry-cord-integration --region ${{ env.REGION }} --format 'value(status.url)')
          RISK_ENGINE_URL=$(gcloud run services describe precise-risk-engine --region ${{ env.REGION }} --format 'value(status.url)')
          gcloud run deploy sentry-api \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/sentry-api:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --set-env-vars="LOG_LEVEL=INFO,ENVIRONMENT=production,CORD_SERVICE_URL=${CORD_URL},USE_PRECISE_RISK_MODEL=true,PRECISE_RISK_ENGINE_URL=${RISK_ENGINE_URL},PRECISE_RISK_ENGINE_TIMEOUT=5,TRAFFIC_PERCENTAGE=0"

      - name: Wait for API to be healthy
        run: |
          for i in {1..30}; do
            API_URL=$(gcloud run services describe sentry-api --region ${{ env.REGION }} --format 'value(status.url)')
            if curl -sf "${API_URL}/health" > /dev/null 2>&1; then
              echo "✅ sentry-api is healthy"
              break
            fi
            echo "Attempt $i/30: waiting..."
            sleep 10
          done

      - name: Deploy sentry-ui
        run: |
          API_URL=$(gcloud run services describe sentry-api --region ${{ env.REGION }} --format 'value(status.url)')
          gcloud run deploy sentry-ui \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/sentry-ui:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --set-env-vars="LOG_LEVEL=INFO,ENVIRONMENT=production"

      - name: Deployment Summary
        run: |
          echo "========================================="
          echo "✅ Deployment Complete"
          echo "========================================="
          API_URL=$(gcloud run services describe sentry-api --region ${{ env.REGION }} --format 'value(status.url)')
          UI_URL=$(gcloud run services describe sentry-ui --region ${{ env.REGION }} --format 'value(status.url)')
          CORD_URL=$(gcloud run services describe sentry-cord-integration --region ${{ env.REGION }} --format 'value(status.url)')
          RISK_ENGINE_URL=$(gcloud run services describe precise-risk-engine --region ${{ env.REGION }} --format 'value(status.url)')
          echo "API:          $API_URL"
          echo "UI:           $UI_URL"
          echo "CORD:         $CORD_URL"
          echo "Risk Engine:  $RISK_ENGINE_URL (Phase 2, Traffic: 0%)"
          echo "========================================="
