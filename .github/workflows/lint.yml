name: Lint & Format

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Python linting
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        working-directory: ./api
        run: |
          pip install -r requirements.txt
          pip install black isort flake8

      - name: Run Black (code formatter check)
        working-directory: ./api
        run: black --check .

      - name: Run isort (import sorter check)
        working-directory: ./api
        run: isort --check-only .

      - name: Run flake8 (linter)
        working-directory: ./api
        continue-on-error: true
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # Node.js linting
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './ui/package-lock.json'

      - name: Install npm dependencies
        working-directory: ./ui
        run: npm ci

      - name: Run prettier (formatter check)
        working-directory: ./ui
        run: npm run format:check 2>/dev/null || echo "No prettier config"

      - name: Run ESLint (linter)
        working-directory: ./ui
        continue-on-error: true
        run: npm run lint 2>/dev/null || echo "No ESLint config"

      - name: Summary
        if: always()
        run: |
          echo "## Code Quality Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Python code checked (black, isort, flake8)" >> $GITHUB_STEP_SUMMARY
          echo "✅ TypeScript code checked (prettier, eslint)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps if failures:**" >> $GITHUB_STEP_SUMMARY
          echo "- Python: run \`black api/ && isort api/\`" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript: run \`npm run format\` in ui/" >> $GITHUB_STEP_SUMMARY
