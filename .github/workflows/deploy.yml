name: Deploy to Google Cloud Run

on:
  push:
    branches: [main, dev]
    paths:
      - 'services/**'
      - 'ui/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'services/**'
      - 'ui/**'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY: gcr.io
  IMAGE_REGISTRY: ${{ secrets.GCP_PROJECT_ID }}/cbp-sentry

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
      environment: ${{ steps.env.outputs.name }}
    steps:
      - name: Determine branch and environment
        id: branch
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "name=main" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Set environment
        id: env
        run: |
          if [[ "${{ steps.branch.outputs.name }}" == "main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pytest
          pip install -r services/api/requirements.txt
          pip install -r services/data/requirements.txt

      - name: Run pytest
        run: |
          pytest services/api/tests -v --tb=short || true
          pytest services/data/tests -v --tb=short || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install UI dependencies
        run: |
          cd ui
          npm install

      - name: TypeScript check
        run: |
          cd ui
          npx tsc --noEmit || true

  build-and-push:
    needs: [setup, test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        service: [api, data, ui]

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: 'gke-gcloud-auth-plugin,cloud-run-proxy'

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker gcr.io

      - name: Build Docker image
        working-directory: services/${{ matrix.service }}
        run: |
          docker build \
            -t "${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REGISTRY }}/sentry-${{ matrix.service }}:${{ github.sha }}" \
            -t "${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REGISTRY }}/sentry-${{ matrix.service }}:latest" \
            -t "${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REGISTRY }}/sentry-${{ matrix.service }}:${{ needs.setup.outputs.branch }}" \
            -f Dockerfile \
            .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push "${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REGISTRY }}/sentry-${{ matrix.service }}:${{ github.sha }}"
          docker push "${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REGISTRY }}/sentry-${{ matrix.service }}:latest"
          docker push "${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REGISTRY }}/sentry-${{ matrix.service }}:${{ needs.setup.outputs.branch }}"

  deploy:
    needs: [setup, build-and-push]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    strategy:
      matrix:
        service:
          - name: api
            port: 8000
            memory: 2Gi
            cpu: 2
            timeout: 300
          - name: data
            port: 8005
            memory: 1Gi
            cpu: 1
            timeout: 300
          - name: ui
            port: 80
            memory: 512Mi
            cpu: 0.5
            timeout: 60

    environment:
      name: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          # Set authentication policy based on service
          if [[ "${{ matrix.service }}" == "ui" ]]; then
            AUTH_FLAG="--allow-unauthenticated"
          else
            AUTH_FLAG="--no-allow-unauthenticated"
          fi

          gcloud run deploy sentry-${{ matrix.service }} \
            --image "${{ env.ARTIFACT_REGISTRY }}/${{ env.IMAGE_REGISTRY }}/sentry-${{ matrix.service }}:${{ github.sha }}" \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --memory ${{ matrix.service.memory }} \
            --cpu ${{ matrix.service.cpu }} \
            --timeout ${{ matrix.service.timeout }} \
            --port ${{ matrix.service.port }} \
            --min-instances 1 \
            --max-instances 100 \
            $AUTH_FLAG \
            --set-env-vars "API_MODE=live,PORT=${{ matrix.service.port }},DEPLOYMENT_ENV=${{ needs.setup.outputs.environment }}" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,VESSELAPI_KEY=VESSELAPI_KEY:latest,OFAC_API_KEY=OFAC_API_KEY:latest" \
            --service-account "sentry-${{ matrix.service }}@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --labels "branch=${{ needs.setup.outputs.branch }},commit=${{ github.sha }}"

      - name: Get Cloud Run URL
        id: deploy
        run: |
          URL=$(gcloud run services describe sentry-${{ matrix.service }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Service deployed: $URL"

  smoke-tests:
    needs: [setup, deploy]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get service URLs
        id: urls
        run: |
          API_URL=$(gcloud run services describe sentry-api --region us-central1 --format 'value(status.url)')
          DATA_URL=$(gcloud run services describe sentry-data --region us-central1 --format 'value(status.url)')
          UI_URL=$(gcloud run services describe sentry-ui --region us-central1 --format 'value(status.url)')

          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "data_url=$DATA_URL" >> $GITHUB_OUTPUT
          echo "ui_url=$UI_URL" >> $GITHUB_OUTPUT

      - name: Test API health
        run: |
          curl -f "${{ steps.urls.outputs.api_url }}/health" || exit 1
          echo "✓ API health check passed"

      - name: Test Data service health
        run: |
          curl -f "${{ steps.urls.outputs.data_url }}/health" || exit 1
          echo "✓ Data service health check passed"

      - name: Test UI availability
        run: |
          curl -f "${{ steps.urls.outputs.ui_url }}" || exit 1
          echo "✓ UI availability check passed"

      - name: Test API endpoints
        run: |
          # List shipments
          curl -f "${{ steps.urls.outputs.api_url }}/api/shipments?limit=1" > /dev/null || exit 1
          echo "✓ List shipments endpoint working"

          # Data service
          curl -f "${{ steps.urls.outputs.api_url }}/api/data/shipments?limit=1" > /dev/null || exit 1
          echo "✓ Data service endpoint working"

  notify:
    needs: [setup, smoke-tests]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && always()

    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "CBP Sentry Deployment ${{ job.status }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 Deployment ${{ job.status == 'success' && '✓ Succeeded' || '✗ Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Environment*\n${{ needs.setup.outputs.environment }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch*\n${{ needs.setup.outputs.branch }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Commit*\n${{ github.sha }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Author*\n${{ github.actor }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                  }
                }
              ]
            }
