name: Deploy — Sentry (Cloud Run)

on:
  push:
    branches: [dev, stage]
  pull_request:
    branches: [dev, stage]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: false
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  GAR_REPO: cbp-sentry

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
      environment: ${{ steps.env.outputs.name }}
    steps:
      - name: Determine branch and environment
        id: branch
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/stage" ]]; then
            echo "name=stage" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/stage" ]]; then
            echo "name=staging" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
          fi

  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      api: 'true'
      data: 'true'
      cord: 'true'
      ui: 'true'
    steps:
      - run: echo "Building all services (simplified change detection)"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pytest
          pip install -r services/api/requirements.txt
          pip install -r services/data/requirements.txt

      - name: Run pytest
        run: |
          pytest services/api/tests -v --tb=short || true
          pytest services/data/tests -v --tb=short || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install UI dependencies
        run: |
          cd ui
          npm install

      - name: TypeScript check
        run: |
          cd ui
          npx tsc --noEmit || true

  bootstrap-bucket:
    name: Bootstrap GCS data bucket
    runs-on: ubuntu-latest
    needs: [setup]
    if: github.event_name == 'push'
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Create bucket if not exists
        run: |
          if ! gcloud storage buckets describe gs://cbp-sentry-appdata --project=${{ env.PROJECT_ID }} 2>/dev/null; then
            echo "Creating GCS bucket gs://cbp-sentry-appdata..."
            gcloud storage buckets create gs://cbp-sentry-appdata \
              --project=${{ env.PROJECT_ID }} --location=${{ env.REGION }}
          else
            echo "GCS bucket already exists"
          fi
          SA="$(gcloud projects describe ${{ env.PROJECT_ID }} --format='value(projectNumber)')-compute@developer.gserviceaccount.com"
          echo "Granting $SA access to bucket..."
          gcloud storage buckets add-iam-policy-binding gs://cbp-sentry-appdata \
            --member=serviceAccount:$SA --role=roles/storage.objectAdmin 2>/dev/null || true

  sync-data-to-gcs:
    name: Sync databases to GCS
    runs-on: ubuntu-latest
    needs: [setup, bootstrap-bucket]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Upload databases to GCS bucket
        run: |
          echo "📤 Syncing databases to GCS bucket..."
          echo ""
          echo "Uploading cbp_sentry.db..."
          gcloud storage cp data/cbp_sentry.db gs://cbp-sentry-appdata/cbp_sentry.db
          echo "✅ cbp_sentry.db uploaded"
          echo ""
          echo "Uploading cord_rag.db..."
          gcloud storage cp data/cord_rag.db gs://cbp-sentry-appdata/cord_rag.db
          echo "✅ cord_rag.db uploaded"
          echo ""
          echo "📊 Verifying uploads..."
          gcloud storage ls --long --human-readable gs://cbp-sentry-appdata/

  build-api:
    name: Build sentry-api
    runs-on: ubuntu-latest
    needs: [setup, test, changes]
    if: |
      github.event_name == 'push' && (
        needs.changes.outputs.api == 'true'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
      - run: |
          set -ex
          IMG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/sentry-api:${{ github.sha }}"
          docker build -t "$IMG" services/api/
          docker push "$IMG"

  build-data:
    name: Build sentry-data
    runs-on: ubuntu-latest
    needs: [setup, test, changes]
    if: |
      github.event_name == 'push' && (
        needs.changes.outputs.data == 'true'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
      - run: |
          set -ex
          IMG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/sentry-data:${{ github.sha }}"
          docker build -t "$IMG" services/data/
          docker push "$IMG"

  build-cord:
    name: Build sentry-cord-integration
    runs-on: ubuntu-latest
    needs: [setup, test, changes]
    if: |
      github.event_name == 'push' && (
        needs.changes.outputs.cord == 'true'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
      - run: |
          set -ex
          IMG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/sentry-cord:${{ github.sha }}"
          docker build -t "$IMG" services/cord-integration/
          docker push "$IMG"

  build-ui:
    name: Build sentry-ui
    runs-on: ubuntu-latest
    needs: [setup, test, deploy-api, changes]
    if: |
      !failure() && !cancelled() &&
      github.event_name == 'push' && (
        needs.changes.outputs.ui == 'true' ||
        needs.changes.outputs.api == 'true'
      )
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Get sentry-api URL
        id: api-url
        run: |
          API_URL=$(gcloud run services describe sentry-api --region ${{ env.REGION }} --format 'value(status.url)')
          echo "url=${API_URL}/api" >> $GITHUB_OUTPUT
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
      - run: |
          set -ex
          IMG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/sentry-ui:${{ github.sha }}"
          docker build \
            --build-arg API_URL="${{ steps.api-url.outputs.url }}" \
            -t "$IMG" ui/
          docker push "$IMG"

  deploy-api:
    name: Deploy sentry-api
    runs-on: ubuntu-latest
    needs: [setup, build-api, deploy-data, deploy-cord, changes]
    if: |
      github.event_name == 'push' && (
        needs.changes.outputs.api == 'true'
      )
    environment:
      name: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Wait for dependencies to be healthy
        run: |
          echo "Waiting for sentry-data to be healthy..."
          for i in {1..30}; do
            if curl -sf https://$(gcloud run services describe sentry-data --region ${{ env.REGION }} --format 'value(status.url)' | sed 's|https://||')/health > /dev/null 2>&1; then
              echo "✅ sentry-data is healthy"
              break
            fi
            echo "Attempt $i/30: sentry-data not ready yet, waiting 5s..."
            sleep 5
          done

          echo "Waiting for sentry-cord-integration to be healthy..."
          for i in {1..30}; do
            if curl -sf https://$(gcloud run services describe sentry-cord-integration --region ${{ env.REGION }} --format 'value(status.url)' | sed 's|https://||')/health > /dev/null 2>&1; then
              echo "✅ sentry-cord-integration is healthy"
              break
            fi
            echo "Attempt $i/30: sentry-cord-integration not ready yet, waiting 5s..."
            sleep 5
          done
      - name: Resolve service URLs
        id: urls
        run: |
          DATA_URL=$(gcloud run services describe sentry-data --region ${{ env.REGION }} --format 'value(status.url)')
          CORD_URL=$(gcloud run services describe sentry-cord-integration --region ${{ env.REGION }} --format 'value(status.url)')
          echo "data_url=${DATA_URL}" >> $GITHUB_OUTPUT
          echo "cord_url=${CORD_URL}" >> $GITHUB_OUTPUT
          echo "Resolved URLs:"
          echo "  Data: ${DATA_URL}"
          echo "  CORD: ${CORD_URL}"
      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cbp-sentry/sentry-api:${{ github.sha }}"
          gcloud run deploy sentry-api \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8000 \
            --memory=2Gi \
            --cpu=2 \
            --concurrency=40 \
            --timeout=300 \
            --min-instances=1 \
            --max-instances=10 \
            --cpu-boost \
            --add-volume name=appdata,type=cloud-storage,bucket=cbp-sentry-appdata \
            --add-volume-mount volume=appdata,mount-path=/app/data \
            --add-volume name=corddata,type=cloud-storage,bucket=cbp-sentry-appdata \
            --add-volume-mount volume=corddata,mount-path=/app/cord-data \
            --set-env-vars API_MODE=live \
            --set-env-vars DEPLOYMENT_ENV=${{ needs.setup.outputs.environment }} \
            --set-env-vars DATA_SERVICE_URL=${{ steps.urls.outputs.data_url }} \
            --set-env-vars CORD_SERVICE_URL=${{ steps.urls.outputs.cord_url }} \
            --set-env-vars VESSELAPI_KEY="${{ secrets.VESSELAPI_KEY }}" \
            --set-env-vars OFAC_API_KEY="${{ secrets.OFAC_API_KEY }}"

  deploy-data:
    name: Deploy sentry-data
    runs-on: ubuntu-latest
    needs: [setup, build-data, bootstrap-bucket, sync-data-to-gcs, changes]
    if: |
      github.event_name == 'push' && (
        needs.changes.outputs.data == 'true'
      )
    environment:
      name: ${{ needs.setup.outputs.environment }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Run
        id: deploy
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cbp-sentry/sentry-data:${{ github.sha }}"
          gcloud run deploy sentry-data \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --execution-environment=gen2 \
            --allow-unauthenticated \
            --port=8005 \
            --memory=1Gi \
            --cpu=1 \
            --concurrency=20 \
            --timeout=900 \
            --min-instances=1 \
            --max-instances=1 \
            --add-volume name=appdata,type=cloud-storage,bucket=cbp-sentry-appdata \
            --add-volume-mount volume=appdata,mount-path=/app/data \
            --set-env-vars DEPLOYMENT_ENV=${{ needs.setup.outputs.environment }}
          URL=$(gcloud run services describe sentry-data --region ${{ env.REGION }} --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "sentry-data deployed to $URL"

  deploy-cord:
    name: Deploy sentry-cord-integration
    runs-on: ubuntu-latest
    needs: [setup, build-cord, bootstrap-bucket, sync-data-to-gcs, changes]
    if: |
      github.event_name == 'push' && (
        needs.changes.outputs.cord == 'true'
      )
    environment:
      name: ${{ needs.setup.outputs.environment }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Resolve Data URL
        id: urls
        run: |
          DATA_URL=$(gcloud run services describe sentry-data --region ${{ env.REGION }} --format 'value(status.url)' 2>/dev/null || echo "")
          echo "data_url=${DATA_URL:-http://sentry-data:8005}" >> $GITHUB_OUTPUT
          echo "Resolved Data URL: ${DATA_URL:-http://sentry-data:8005}"
      - name: Deploy to Cloud Run
        id: deploy
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cbp-sentry/sentry-cord:${{ github.sha }}"
          gcloud run deploy sentry-cord-integration \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --execution-environment=gen2 \
            --allow-unauthenticated \
            --port=8004 \
            --memory=2Gi \
            --cpu=2 \
            --concurrency=20 \
            --timeout=900 \
            --min-instances=1 \
            --max-instances=1 \
            --add-volume name=appdata,type=cloud-storage,bucket=cbp-sentry-appdata \
            --add-volume-mount volume=appdata,mount-path=/app/data \
            --add-volume name=corddata,type=cloud-storage,bucket=cbp-sentry-appdata \
            --add-volume-mount volume=corddata,mount-path=/app/cord-data \
            --set-env-vars CORD_DATA_DIR=/app/cord-data \
            --set-env-vars DATA_SERVICE_URL=${{ steps.urls.outputs.data_url }} \
            --set-env-vars DEPLOYMENT_ENV=${{ needs.setup.outputs.environment }}
          URL=$(gcloud run services describe sentry-cord-integration --region ${{ env.REGION }} --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "sentry-cord-integration deployed to $URL"

  deploy-ui:
    name: Deploy sentry-ui
    runs-on: ubuntu-latest
    needs: [setup, build-ui, changes]
    if: |
      !failure() && !cancelled() &&
      github.event_name == 'push' && (
        needs.changes.outputs.ui == 'true' ||
        needs.changes.outputs.api == 'true'
      )
    environment:
      name: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cbp-sentry/sentry-ui:${{ github.sha }}"
          gcloud run deploy sentry-ui \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=80 \
            --memory=512Mi \
            --cpu=1 \
            --concurrency=80 \
            --timeout=60 \
            --min-instances=0 \
            --max-instances=10

  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [setup, deploy-ui]
    if: always() && github.event_name == 'push'
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Get service URLs
        id: urls
        run: |
          API_URL=$(gcloud run services describe sentry-api --region ${{ env.REGION }} --format 'value(status.url)')
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
      - name: Test API health
        run: |
          curl -f "${{ steps.urls.outputs.api_url }}/health" || exit 1
          echo "✅ API health check passed"
      - name: Test CORD health
        run: |
          CORD_URL=$(gcloud run services describe sentry-cord-integration --region ${{ env.REGION }} --format 'value(status.url)')
          curl -f "$CORD_URL/health" || exit 1
          echo "✅ CORD health check passed"
      - name: Get service summary
        run: |
          API=$(gcloud run services describe sentry-api --region ${{ env.REGION }} --format 'value(status.url)')
          DATA=$(gcloud run services describe sentry-data --region ${{ env.REGION }} --format 'value(status.url)')
          CORD=$(gcloud run services describe sentry-cord-integration --region ${{ env.REGION }} --format 'value(status.url)')
          UI=$(gcloud run services describe sentry-ui --region ${{ env.REGION }} --format 'value(status.url)')
          echo ""
          echo "✅ Deployment Complete"
          echo "===================================="
          echo "🔵 API:   $API"
          echo "📊 Data:  $DATA"
          echo "🔗 CORD:  $CORD"
          echo "🎨 UI:    $UI"
          echo "===================================="

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [setup, smoke-tests]
    if: github.event_name == 'push' && always()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        if: always()
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "CBP Sentry ${{ needs.setup.outputs.environment }} deployment ${{ needs.smoke-tests.result }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 ${{ needs.setup.outputs.environment }} — ${{ needs.smoke-tests.result == 'success' && '✅ Deployed' || '❌ Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Branch*\n${{ needs.setup.outputs.branch }}"},
                    {"type": "mrkdwn", "text": "*Commit*\n${{ github.sha }}"}
                  ]
                }
              ]
            }
