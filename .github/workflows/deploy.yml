name: Deploy — Sentry (Cloud Run)

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  GAR_REPO: cbp-sentry

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.branch.outputs.name }}
      environment: ${{ steps.env.outputs.name }}
    steps:
      - name: Determine branch and environment
        id: branch
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "name=main" >> $GITHUB_OUTPUT
          else
            echo "name=dev" >> $GITHUB_OUTPUT
          fi

      - name: Set environment
        id: env
        run: |
          if [[ "${{ steps.branch.outputs.name }}" == "main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pytest
          pip install -r services/api/requirements.txt
          pip install -r services/data/requirements.txt

      - name: Run pytest
        run: |
          pytest services/api/tests -v --tb=short || true
          pytest services/data/tests -v --tb=short || true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install UI dependencies
        run: |
          cd ui
          npm install

      - name: TypeScript check
        run: |
          cd ui
          npx tsc --noEmit || true

  build-api:
    name: Build sentry-api
    runs-on: ubuntu-latest
    needs: [setup, test]
    if: github.event_name == 'push'
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
      - id: build
        run: |
          IMG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/sentry-api:${{ github.sha }}"
          docker build -t "$IMG" services/api/
          docker push "$IMG"
          echo "image=$IMG" >> $GITHUB_OUTPUT

  build-data:
    name: Build sentry-data
    runs-on: ubuntu-latest
    needs: [setup, test]
    if: github.event_name == 'push'
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
      - id: build
        run: |
          IMG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/sentry-data:${{ github.sha }}"
          docker build -t "$IMG" services/data/
          docker push "$IMG"
          echo "image=$IMG" >> $GITHUB_OUTPUT

  build-ui:
    name: Build sentry-ui
    runs-on: ubuntu-latest
    needs: [setup, test]
    if: github.event_name == 'push'
    outputs:
      image: ${{ steps.build.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
      - id: build
        run: |
          IMG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/sentry-ui:${{ github.sha }}"
          docker build -t "$IMG" ui/
          docker push "$IMG"
          echo "image=$IMG" >> $GITHUB_OUTPUT

  deploy-api:
    name: Deploy sentry-api
    runs-on: ubuntu-latest
    needs: [setup, build-api]
    if: github.event_name == 'push'
    environment:
      name: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ needs.build-api.outputs.image }}"
          [ -z "$IMAGE" ] && echo "ERROR: No image from build-api" && exit 1
          gcloud run deploy sentry-api \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --no-allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --concurrency=40 \
            --timeout=300 \
            --min-instances=1 \
            --max-instances=10 \
            --set-env-vars API_MODE=fixture \
            --set-env-vars DEPLOYMENT_ENV=${{ needs.setup.outputs.environment }} \
            --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --set-env-vars VESSELAPI_KEY="${{ secrets.VESSELAPI_KEY }}" \
            --set-env-vars OFAC_API_KEY="${{ secrets.OFAC_API_KEY }}"

  deploy-data:
    name: Deploy sentry-data
    runs-on: ubuntu-latest
    needs: [setup, build-data]
    if: github.event_name == 'push'
    environment:
      name: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ needs.build-data.outputs.image }}"
          [ -z "$IMAGE" ] && echo "ERROR: No image from build-data" && exit 1
          gcloud run deploy sentry-data \
            --image="$IMAGE" \
            --region=${{ env.REGION }} \
            --platform=managed \
            --no-allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --concurrency=20 \
            --timeout=300 \
            --min-instances=1 \
            --max-instances=5 \
            --set-env-vars DEPLOYMENT_ENV=${{ needs.setup.outputs.environment }} \
            --set-env-vars DATABASE_URL="${{ secrets.DATABASE_URL }}"

  deploy-ui:
    name: Deploy sentry-ui
    runs-on: ubuntu-latest
    needs: [setup, build-ui, deploy-api]
    if: github.event_name == 'push'
    environment:
      name: ${{ needs.setup.outputs.environment }}
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ needs.build-ui.outputs.image }}"
          [ -z "$IMAGE" ] && echo "ERROR: No image from build-ui" && exit 1
          gcloud run deploy sentry-ui \
            --image="$IMAGE" \
            --region=${{ env.REGION }} --platform=managed \
            --allow-unauthenticated \
            --memory=512Mi --cpu=1 --concurrency=80 --timeout=60 \
            --min-instances=0 --max-instances=10

  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [setup, deploy-ui]
    if: github.event_name == 'push'
    steps:
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Get service URLs
        id: urls
        run: |
          API_URL=$(gcloud run services describe sentry-api --region ${{ env.REGION }} --format 'value(status.url)')
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
      - name: Test API health
        run: |
          curl -f "${{ steps.urls.outputs.api_url }}/health" || exit 1
          echo "✅ API health check passed"
      - name: Get service summary
        run: |
          API=$(gcloud run services describe sentry-api --region ${{ env.REGION }} --format 'value(status.url)')
          DATA=$(gcloud run services describe sentry-data --region ${{ env.REGION }} --format 'value(status.url)')
          UI=$(gcloud run services describe sentry-ui --region ${{ env.REGION }} --format 'value(status.url)')
          echo ""
          echo "✅ Deployment Complete"
          echo "========================"
          echo "🔵 API:  $API"
          echo "📊 Data: $DATA"
          echo "🎨 UI:   $UI"
          echo "========================"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [setup, smoke-tests]
    if: github.event_name == 'push' && always()
    steps:
      - name: Slack notification
        uses: slackapi/slack-github-action@v1.24.0
        if: always()
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "CBP Sentry ${{ needs.setup.outputs.environment }} deployment ${{ needs.smoke-tests.result }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 ${{ needs.setup.outputs.environment }} — ${{ needs.smoke-tests.result == 'success' && '✅ Deployed' || '❌ Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*Branch*\n${{ needs.setup.outputs.branch }}"},
                    {"type": "mrkdwn", "text": "*Commit*\n${{ github.sha }}"}
                  ]
                }
              ]
            }
