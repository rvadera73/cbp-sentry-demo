name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  REGISTRY_URL: us-central1-docker.pkg.dev
  DEMO_MODE: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY_URL }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build API image
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/api:${{ github.sha }}
            ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build UI image
      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/ui:${{ github.sha }}
            ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy API to Cloud Run
      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy sentry-api \
            --image=${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/api:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=production,DEMO_MODE=${{ env.DEMO_MODE }},GCP_PROJECT=${{ env.GCP_PROJECT_ID }}" \
            --memory=2Gi \
            --cpu=2 \
            --timeout=3600 \
            --max-instances=100

      # Deploy UI to Cloud Run
      - name: Deploy UI to Cloud Run
        run: |
          gcloud run deploy sentry-ui \
            --image=${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/ui:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=production,DEMO_MODE=${{ env.DEMO_MODE }}" \
            --memory=512Mi \
            --cpu=1 \
            --timeout=300 \
            --max-instances=50

      - name: Post deployment summary
        if: success()
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Region | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| sentry-api | ${{ env.GCP_REGION }} | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "| sentry-ui | ${{ env.GCP_REGION }} | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: production" >> $GITHUB_STEP_SUMMARY
          echo "**Demo Mode**: ${{ env.DEMO_MODE }}" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Cloud Run deployment failed.** Check workflow logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            })
