name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  REGISTRY_URL: us-central1-docker.pkg.dev
  DEMO_MODE: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY_URL }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Bootstrap GCS bucket for persistent storage
      - name: Bootstrap GCS bucket
        run: |
          # Create shared data bucket if it doesn't exist
          if ! gcloud storage buckets describe gs://cbp-sentry-appdata --project=${{ env.GCP_PROJECT_ID }} 2>/dev/null; then
            echo "Creating GCS bucket gs://cbp-sentry-appdata..."
            gcloud storage buckets create gs://cbp-sentry-appdata \
              --project=${{ env.GCP_PROJECT_ID }} \
              --location=${{ env.GCP_REGION }}
          else
            echo "GCS bucket already exists"
          fi

          # Grant Cloud Run service account access
          SA="$(gcloud projects describe ${{ env.GCP_PROJECT_ID }} --format='value(projectNumber)')-compute@developer.gserviceaccount.com"
          echo "Granting $SA access to bucket..."
          gcloud storage buckets add-iam-policy-binding gs://cbp-sentry-appdata \
            --member=serviceAccount:$SA \
            --role=roles/storage.objectAdmin 2>/dev/null || true

      # Build Data Service image
      - name: Build and push Data Service image
        uses: docker/build-push-action@v5
        with:
          context: ./services/data
          dockerfile: ./services/data/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/data:${{ github.sha }}
            ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/data:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build API image
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./services/api
          dockerfile: ./services/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/api:${{ github.sha }}
            ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build UI image
      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: ./ui
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/ui:${{ github.sha }}
            ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build CORD Integration image
      - name: Build and push CORD Integration image
        uses: docker/build-push-action@v5
        with:
          context: ./services/cord-integration
          dockerfile: ./services/cord-integration/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/cord:${{ github.sha }}
            ${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/cord:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy Data Service to Cloud Run
      - name: Deploy Data Service to Cloud Run
        run: |
          gcloud run deploy sentry-data \
            --image=${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/data:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --execution-environment=gen2 \
            --allow-unauthenticated \
            --add-volume name=appdata,type=cloud-storage,bucket=cbp-sentry-appdata \
            --add-volume-mount volume=appdata,mount-path=/app/data \
            --set-env-vars="ENVIRONMENT=production,DATABASE_URL=sqlite:///./data/cbp_sentry.db" \
            --memory=1Gi \
            --cpu=1 \
            --timeout=900 \
            --max-instances=1

      # Deploy CORD Integration to Cloud Run
      - name: Deploy CORD Integration to Cloud Run
        run: |
          gcloud run deploy sentry-cord-integration \
            --image=${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/cord:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --execution-environment=gen2 \
            --allow-unauthenticated \
            --add-volume name=appdata,type=cloud-storage,bucket=cbp-sentry-appdata \
            --add-volume-mount volume=appdata,mount-path=/app/data \
            --set-env-vars="CORD_DATA_DIR=/app/cord-data,LOG_LEVEL=INFO" \
            --memory=2Gi \
            --cpu=2 \
            --timeout=900 \
            --max-instances=1

      # Resolve service URLs for downstream services
      - name: Resolve Cloud Run service URLs
        id: urls
        run: |
          DATA_URL=$(gcloud run services describe sentry-data \
            --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status.url)')
          CORD_URL=$(gcloud run services describe sentry-cord-integration \
            --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status.url)')

          echo "data_url=$DATA_URL" >> $GITHUB_OUTPUT
          echo "cord_url=$CORD_URL" >> $GITHUB_OUTPUT

          echo "Service URLs resolved:"
          echo "  Data: $DATA_URL"
          echo "  CORD: $CORD_URL"

      # Deploy API to Cloud Run
      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy sentry-api \
            --image=${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/api:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --execution-environment=gen2 \
            --allow-unauthenticated \
            --add-volume name=appdata,type=cloud-storage,bucket=cbp-sentry-appdata \
            --add-volume-mount volume=appdata,mount-path=/app/data \
            --set-env-vars="ENVIRONMENT=production,DEMO_MODE=${{ env.DEMO_MODE }},GCP_PROJECT=${{ env.GCP_PROJECT_ID }},DATA_SERVICE_URL=${{ steps.urls.outputs.data_url }},CORD_SERVICE_URL=${{ steps.urls.outputs.cord_url }}" \
            --memory=2Gi \
            --cpu=2 \
            --timeout=3600 \
            --max-instances=100

      # Get API service URL for UI
      - name: Get API service URL
        id: api_url
        run: |
          API_URL=$(gcloud run services describe sentry-api \
            --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status.url)')
          echo "url=$API_URL" >> $GITHUB_OUTPUT
          echo "API URL: $API_URL"

      # Deploy UI to Cloud Run
      - name: Deploy UI to Cloud Run
        run: |
          gcloud run deploy sentry-ui \
            --image=${{ env.REGISTRY_URL }}/${{ env.GCP_PROJECT_ID }}/sentry/ui:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --execution-environment=gen2 \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=production,DEMO_MODE=${{ env.DEMO_MODE }},VITE_API_URL=${{ steps.api_url.outputs.url }}" \
            --memory=512Mi \
            --cpu=1 \
            --timeout=300 \
            --max-instances=50

      - name: Post deployment summary
        if: success()
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Region | Status | Storage |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|--------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| sentry-data | ${{ env.GCP_REGION }} | ✅ Deployed | GCS FUSE (cbp-sentry-appdata) |" >> $GITHUB_STEP_SUMMARY
          echo "| sentry-cord-integration | ${{ env.GCP_REGION }} | ✅ Deployed | GCS FUSE (cbp-sentry-appdata) |" >> $GITHUB_STEP_SUMMARY
          echo "| sentry-api | ${{ env.GCP_REGION }} | ✅ Deployed | GCS FUSE (cbp-sentry-appdata) |" >> $GITHUB_STEP_SUMMARY
          echo "| sentry-ui | ${{ env.GCP_REGION }} | ✅ Deployed | — |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: production" >> $GITHUB_STEP_SUMMARY
          echo "**Execution**: gen2 (required for GCS FUSE)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service URLs**:" >> $GITHUB_STEP_SUMMARY
          echo "- Data: ${{ steps.urls.outputs.data_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- CORD: ${{ steps.urls.outputs.cord_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ steps.api_url.outputs.url }}" >> $GITHUB_STEP_SUMMARY

          UI_URL=$(gcloud run services describe sentry-ui \
            --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} --format='value(status.url)')
          echo "- UI: $UI_URL" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Cloud Run deployment failed.** Check workflow logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            })
